no-hosts
no-resolv
log-queries
except-interface=lo

# VLAN 50 - Reception (10.30.50.0/27, gw 10.30.50.1)
dhcp-range=set:vlan50,10.30.50.20,10.30.50.28,255.255.255.224,12h
dhcp-option=tag:vlan50,option:router,10.30.50.1
dhcp-option=tag:vlan50,option:dns-server,10.30.130.5

# VLAN 110 - Guests (10.30.110.0/28, gw 10.30.110.1)
dhcp-range=set:vlan110,10.30.110.5,10.30.110.13,255.255.255.240,12h
dhcp-option=tag:vlan110,option:router,10.30.110.1
dhcp-option=tag:vlan110,option:dns-server,10.30.130.5
