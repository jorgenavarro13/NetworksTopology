no-hosts
no-resolv
log-queries
except-interface=lo

# VLAN 50 - Reception (10.40.50.0/28, gw 10.40.50.1)
dhcp-range=set:vlan50,10.40.50.5,10.40.50.13,255.255.255.240,12h
dhcp-option=tag:vlan50,option:router,10.40.50.1
dhcp-option=tag:vlan50,option:dns-server,10.40.130.40

# VLAN 110 - Guests (10.40.110.0/28, gw 10.40.110.1)
dhcp-range=set:vlan110,10.40.110.5,10.40.110.13,255.255.255.240,12h
dhcp-option=tag:vlan110,option:router,10.40.110.1
dhcp-option=tag:vlan110,option:dns-server,10.40.130.40
