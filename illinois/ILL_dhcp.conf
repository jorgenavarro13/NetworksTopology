no-hosts
no-resolv
log-queries
except-interface=lo

# VLAN 50 - Reception (10.10.50.0/26, gw 10.10.50.1)
dhcp-range=set:vlan50,10.10.50.50,10.10.50.60,255.255.255.192,12h
dhcp-option=tag:vlan50,option:router,10.10.50.1
dhcp-option=tag:vlan50,option:dns-server,10.10.130.40

# VLAN 110 - Guests (10.10.110.0/25, gw 10.10.110.1)
dhcp-range=set:vlan110,10.10.110.5,10.10.110.60,255.255.255.128,12h
dhcp-option=tag:vlan110,option:router,10.10.110.1
dhcp-option=tag:vlan110,option:dns-server,10.10.130.40
