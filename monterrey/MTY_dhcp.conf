no-hosts
no-resolv
log-queries
except-interface=lo

# VLAN 50 - Reception (10.20.50.0/28, gw 10.20.50.1)
dhcp-range=set:vlan50,10.20.50.5,10.20.50.13,255.255.255.240,12h
dhcp-option=tag:vlan50,option:router,10.20.50.1
dhcp-option=tag:vlan50,option:dns-server,10.20.130.5

# VLAN 110 - Guests (10.20.110.0/26, gw 10.20.110.1)
dhcp-range=set:vlan110,10.20.110.5,10.20.110.60,255.255.255.192,12h
dhcp-option=tag:vlan110,option:router,10.20.110.1
dhcp-option=tag:vlan110,option:dns-server,10.20.130.5
